version: '3.9'

services:
  # ── FastAPI backend + APScheduler ──────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nbd_api
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      - DATABASE_URL=sqlite:////data/bias_detector.db
      - SCRAPE_INTERVAL_MINUTES=60
    volumes:
      - db_data:/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── React frontend (nginx) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nbd_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  db_data:
